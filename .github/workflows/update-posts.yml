name: Update Posts Index

on:
  push:
    branches:
      - main
    paths:
      - 'posts/**/*.md'
      - '.github/workflows/update-posts.yml'
      - 'scripts/build-posts-index.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-posts-index:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Rebuild posts index
        run: python scripts/build-posts-index.py

      - name: Commit updated index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posts/index.json
          git diff --cached --quiet && exit 0
          git commit -m "Update posts index"
          git push
